name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish image and Helm chart
    timeout-minutes: 25
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$ ]]; then
            echo "Invalid release tag: $GITHUB_REF_NAME"
            exit 1
          fi

          # Check if the release commit is an ancestor of the main branch
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

          expected_app_version="${GITHUB_REF_NAME%-*}"
          app_version="$(sed -n 's/^appVersion: //p' charts/xenorchestra-cloud-controller-manager/Chart.yaml)"
          if [ "$app_version" != "$expected_app_version" ]; then
            echo "Chart appVersion ($app_version) must match the application version ($expected_app_version)"
            exit 1
          fi

          echo "APP_VERSION=$app_version" >> "$GITHUB_ENV"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.13.3

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Github registry login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        timeout-minutes: 10
        run: make images
        env:
          PUSH: "true"
          TAG: ${{ env.APP_VERSION }}
          VERSION: ${{ env.APP_VERSION }}
      - name: Sign image
        timeout-minutes: 4
        run: make images-cosign
        env:
          TAG: ${{ env.APP_VERSION }}

      - name: Publish and sign Helm chart
        timeout-minutes: 5
        run: make helm-login helm-release
        env:
          HELM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
